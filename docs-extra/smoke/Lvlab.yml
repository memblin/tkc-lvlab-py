---
# Smoke-test manifest: each cloud image lvlab ships by default, one
# static and one DHCP machine apiece. Validates the lvlab up/down
# manifest path and the MAC-matching network-config fix across distros.
#
# No per-machine cloud_init.user: it defaults to the image's resolved
# first-boot account (debian/ubuntu/fedora/almalinux) via the shared
# catalog resolution. run-smoke.sh SSHes in as that same user.
environment:
  - name: smoke
    libvirt_uri: qemu:///system
    config_defaults:
      domain: local
      cpu: 1
      # Fallback only — each machine pins its own minimized per-distro memory
      # below (smallest reliable footprint per distro's documented floor,
      # never under 512 MiB). Debian 512 / Ubuntu 1024 / AlmaLinux 1536 /
      # Fedora 2048. See the retest footprint plan.
      memory: 1024
      disks:
        - name: primary
          size: 12G
      interfaces:
        network: default
        network_type: network
        nameservers:
          search: [local]
          addresses: [192.168.122.1]
      cloud_init:
        pubkey: ~/.ssh/id_ed25519.pub
        sudo: ["ALL=(ALL) NOPASSWD:ALL"]
        shell: /bin/bash

    machines:
      # --- Debian 12 ---
      - vm_name: deb12-static
        hostname: deb12-static
        os: debian12
        memory: 512
        interfaces:
          - name: eth0
            ip4: 192.168.122.190/24
            ip4gw: 192.168.122.1
      - vm_name: deb12-dhcp
        hostname: deb12-dhcp
        os: debian12
        memory: 512
        interfaces:
          - name: eth0

      # --- Debian 13 ---
      - vm_name: deb13-static
        hostname: deb13-static
        os: debian13
        memory: 512
        interfaces:
          - name: eth0
            ip4: 192.168.122.191/24
            ip4gw: 192.168.122.1
      - vm_name: deb13-dhcp
        hostname: deb13-dhcp
        os: debian13
        memory: 512
        interfaces:
          - name: eth0

      # --- Debian 11 (network_version 1 / ENI) ---
      - vm_name: deb11-static
        hostname: deb11-static
        os: debian11
        memory: 512
        interfaces:
          - name: eth0
            ip4: 192.168.122.194/24
            ip4gw: 192.168.122.1
      - vm_name: deb11-dhcp
        hostname: deb11-dhcp
        os: debian11
        memory: 512
        interfaces:
          - name: eth0

      # --- Fedora 44 ---
      - vm_name: fed44-static
        hostname: fed44-static
        os: fedora44
        memory: 2048
        interfaces:
          - name: eth0
            ip4: 192.168.122.192/24
            ip4gw: 192.168.122.1
      - vm_name: fed44-dhcp
        hostname: fed44-dhcp
        os: fedora44
        memory: 2048
        interfaces:
          - name: eth0

      # --- AlmaLinux 10 ---
      - vm_name: alma10-static
        hostname: alma10-static
        os: almalinux10
        memory: 1536
        interfaces:
          - name: eth0
            ip4: 192.168.122.193/24
            ip4gw: 192.168.122.1
      - vm_name: alma10-dhcp
        hostname: alma10-dhcp
        os: almalinux10
        memory: 1536
        interfaces:
          - name: eth0

      # --- AlmaLinux 9 ---
      - vm_name: alma9-static
        hostname: alma9-static
        os: almalinux9
        memory: 1536
        interfaces:
          - name: eth0
            ip4: 192.168.122.195/24
            ip4gw: 192.168.122.1
      - vm_name: alma9-dhcp
        hostname: alma9-dhcp
        os: almalinux9
        memory: 1536
        interfaces:
          - name: eth0

      # --- Ubuntu 22.04 ---
      - vm_name: ubuntu2204-static
        hostname: ubuntu2204-static
        os: ubuntu2204
        memory: 1024
        interfaces:
          - name: eth0
            ip4: 192.168.122.196/24
            ip4gw: 192.168.122.1
      - vm_name: ubuntu2204-dhcp
        hostname: ubuntu2204-dhcp
        os: ubuntu2204
        memory: 1024
        interfaces:
          - name: eth0

      # --- Ubuntu 24.04 ---
      - vm_name: ubuntu2404-static
        hostname: ubuntu2404-static
        os: ubuntu2404
        memory: 1024
        interfaces:
          - name: eth0
            ip4: 192.168.122.197/24
            ip4gw: 192.168.122.1
      - vm_name: ubuntu2404-dhcp
        hostname: ubuntu2404-dhcp
        os: ubuntu2404
        memory: 1024
        interfaces:
          - name: eth0

images:
  debian12:
    image_url: https://cloud.debian.org/images/cloud/bookworm/20260518-2482/debian-12-generic-amd64-20260518-2482.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/bookworm/20260518-2482/SHA512SUMS
    checksum_type: sha512
    network_version: 2
  debian13:
    image_url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/trixie/latest/SHA512SUMS
    checksum_type: sha512
    network_version: 2
  debian11:
    image_url: https://cloud.debian.org/images/cloud/bullseye/20260518-2482/debian-11-generic-amd64-20260518-2482.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/bullseye/20260518-2482/SHA512SUMS
    checksum_type: sha512
    network_version: 1
  fedora44:
    image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2
    checksum_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-44-1.7-x86_64-CHECKSUM
