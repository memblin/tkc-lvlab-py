---
environment:
  - name: lvlab-dev
    libvirt_uri: qemu:///system
    config_defaults:
      domain: local
      os: debian13
      cpu: 2
      memory: 2048
      disks:
        - name: primary
          size: 25G
      interfaces:
          network: default
          nameservers:
            search: [local]
            addresses: [192.168.122.1]
      shared_directories:
        - source: ~/repos
          mount_tag: gitrepos
      cloud_init:
        user: root
        pubkey: ~/.ssh/id_ed25519.pub
        sudo: ["ALL=(ALL) NOPASSWD:ALL"]
        shell: /bin/bash
        runcmd:
          - curl --insecure https://vault.tkclabs.io:8200/v1/root_ca/ca/pem > /etc/pki/ca-trust/source/anchors/vault.tkclabs.io.crt
          - curl -s -o /root/bootstrap-salt.sh -L https://bootstrap.saltproject.io
          - chmod 0755 /root/bootstrap-salt.sh
          - /root/bootstrap-salt.sh -X -A salt.local stable 3007
          - |
            cat << EOF > /etc/salt/minion.d/cloud_init_customization.conf
            # This reduces latency for some salt operations when reverse
            # DNS is not in place for the machine.
            enable_fqdns_grains: False

            EOF
          - systemctl enable --now salt-minion

    machines:
      - vm_name: salt.local
        hostname: salt
        interfaces:
          - name: eth0
            ip4: 192.168.122.12/24
            ip4gw: 192.168.122.1
        cloud_init:
          runcmd_ignore_defaults: true
          runcmd:
            - curl --insecure https://vault.tkclabs.io:8200/v1/root_ca/ca/pem > /etc/pki/ca-trust/source/anchors/vault.tkclabs.io.crt
            - curl -s -o /root/bootstrap-salt.sh -L https://bootstrap.saltproject.io
            - chmod 0755 /root/bootstrap-salt.sh
            - /root/bootstrap-salt.sh -X -M -A 127.0.0.1 stable 3007
            # Salt master config customization
            - |
              cat << EOF > /etc/salt/master.d/cloud_init_master.conf
              # Auto-accept for the lab
              auto_accept: True

              EOF
            # Salt minion config customization
            - |
              cat << EOF > /etc/salt/minion.d/cloud_init_minion.conf
              # This reduces latency for some salt operations when reverse
              # DNS is not in place for the machine.
              enable_fqdns_grains: False

              EOF
            - systemctl enable --now salt-master
            - systemctl enable --now salt-minion
          mounts:
            - [gitrepos, /srv/git, virtiofs, "ro,relatime"]
      - vm_name: vault.local
        hostname: vault
        interfaces:
          - name: eth0
            ip4: 192.168.122.16/24
            ip4gw: 192.168.122.1
        cloud_init:
          runcmd:
            - touch /tmp/cloud_init_from_machine_file
      - vm_name: jenkins.local
        hostname: jenkins
        interfaces:
          - name: eth0
            ip4: 192.168.122.17/24
            ip4gw: 192.168.122.1
      - vm_name: dhcpconfig.local
        hostname: dhcpconfig
        interfaces:
          - name: eth0

images:
  debian13:
    image_url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/trixie/latest/SHA512SUMS
    checksum_type: sha512
    network_version: 2
  debian12:
    image_url: https://cloud.debian.org/images/cloud/bookworm/20260518-2482/debian-12-generic-amd64-20260518-2482.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/bookworm/20260518-2482/SHA512SUMS
    checksum_type: sha512
    network_version: 2
  debian11:
    image_url: https://cloud.debian.org/images/cloud/bullseye/20260518-2482/debian-11-generic-amd64-20260518-2482.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/bullseye/20260518-2482/SHA512SUMS
    checksum_type: sha512
    network_version: 1
  fedora44:
    image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2
    checksum_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-44-1.7-x86_64-CHECKSUM
    checksum_url_gpg: https://fedoraproject.org/fedora.gpg
    checksum_type: sha256
    network_version: 2
  almalinux10:
    image_url: https://repo.almalinux.org/almalinux/10/cloud/x86_64/images/AlmaLinux-10-GenericCloud-latest.x86_64.qcow2
    checksum_url: https://repo.almalinux.org/almalinux/10/cloud/x86_64/images/CHECKSUM
    checksum_type: sha256
    network_version: 2
  almalinux9:
    image_url: https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2
    checksum_url: https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/CHECKSUM
    checksum_type: sha256
    network_version: 2
  # Ubuntu: .img cloud image (qcow2 inside); SHA256SUMS uses the
  # ``hex *file`` binary marker; GPG is a detached SHA256SUMS.gpg our
  # clearsign verifier can't consume, so checksum_url_gpg is omitted.
  # os_variant is pinned because the key derives the osinfo-unknown
  # ``ubuntu2204`` (osinfo wants ``ubuntu22.04``).
  ubuntu2204:
    image_url: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
    checksum_url: https://cloud-images.ubuntu.com/jammy/current/SHA256SUMS
    checksum_type: sha256
    network_version: 2
    os_variant: ubuntu22.04
  ubuntu2404:
    image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    checksum_url: https://cloud-images.ubuntu.com/noble/current/SHA256SUMS
    checksum_type: sha256
    network_version: 2
    os_variant: ubuntu24.04
