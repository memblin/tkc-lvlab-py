site_name: tkc-lvlab
site_description: A Click-based CLI for managing local libvirt+QEMU lab VMs from a declarative YAML manifest.
site_url: https://memblin.github.io/tkc-lvlab-py/
repo_url: https://github.com/memblin/tkc-lvlab-py
repo_name: memblin/tkc-lvlab-py
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            docstring_section_style: spacy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/index.md
      - Logging: api/logging.md
      - Config: api/config.md
      - utils:
          - virsh: api/utils/virsh.md
          - ssh_keys: api/utils/ssh_keys.md
          - passwords: api/utils/passwords.md
          - requirements: api/utils/requirements.md
          - network: api/utils/network.md
          - standalone_cloud_init: api/utils/standalone_cloud_init.md
          - snapshot_cleanup: api/utils/snapshot_cleanup.md
          - vdisk: api/utils/vdisk.md
      - scripts:
          - createvm: api/scripts/createvm.md
          - destroyvm: api/scripts/destroyvm.md

# Pages not listed in `nav` above are intentionally excluded from the
# navigation. The legacy user-facing docs (Walkthrough.md etc.) remain
# in `docs/` until the legacy-docs conversion lands; the internal
# planning artifacts (lvscripts-survey.md etc.) are not meant to render
# in the public site at all.
exclude_docs: |
  Walkthrough.md
  Design.md
  Why.md
  Libvirt.md
  releases.md
  CONTRIBUTING.md
  WIP.md
  Lvlab.example.yml
  lvscripts-survey.md
  cloud-init.examples/
