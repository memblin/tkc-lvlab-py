site_name: tkc-lvlab
site_description: A Click-based CLI for managing local libvirt+QEMU lab VMs from a declarative YAML manifest.
site_url: https://memblin.github.io/tkc-lvlab-py/
repo_url: https://github.com/memblin/tkc-lvlab-py
repo_name: memblin/tkc-lvlab-py
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            docstring_section_style: spacy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
      - Why lvlab: why.md
      - Walkthrough: walkthrough.md
      - Example manifest: example-manifest.md
      - One-off VMs: one-off-vms.md
      - Cloud-init examples: cloud-init-examples.md
      - Libvirt notes: libvirt-notes.md
  - API Reference:
      - Overview: api/index.md
      - Logging: api/logging.md
      - CLI: api/cli.md
      - Config: api/config.md
      - utils:
          - virsh: api/utils/virsh.md
          - ssh_keys: api/utils/ssh_keys.md
          - passwords: api/utils/passwords.md
          - requirements: api/utils/requirements.md
          - network: api/utils/network.md
          - standalone_cloud_init: api/utils/standalone_cloud_init.md
          - snapshot_cleanup: api/utils/snapshot_cleanup.md
          - vdisk: api/utils/vdisk.md
          - images: api/utils/images.md
          - cloud_init: api/utils/cloud_init.md
          - libvirt: api/utils/libvirt.md
      - scripts:
          - createvm: api/scripts/createvm.md
          - deletevm: api/scripts/deletevm.md

# `docs-extra/` (sibling to this `docs/` source root) holds
# contributor/maintainer reference that doesn't render in the
# published site: CONTRIBUTING.md, Design.md, releases.md,
# host-validation.md, lvscripts-survey.md. Those are GitHub-rendered
# and stay there by design — they assume surrounding repo context
# (PR templates, source links, issue cross-references). The user-
# facing pages were folded into the User Guide nav above as of the
# 0.4.0 doc-polish pass.
