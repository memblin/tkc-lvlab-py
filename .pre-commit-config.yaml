repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        # docs/api/ pages contain `:::` mkdocstrings directives that must
        # not be re-escaped by mdformat — particularly leading-underscore
        # module names like ``tkc_lvlab._logging`` that mdformat would
        # otherwise rewrite to ``\_logging`` and break the directive.
        exclude: ^docs/api/
        additional_dependencies:
          - mdformat-mkdocs==4.1.2
          - mdformat-gfm==0.4.1
          - more_itertools<11
