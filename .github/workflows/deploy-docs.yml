name: deploy-docs

# Builds the Zensical site from docs/ + src/ (mkdocstrings reads
# the package source for the API reference) and publishes it to
# GitHub Pages at https://memblin.github.io/tkc-lvlab-py/.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deploy per ref. New pushes queue
# behind the running build; never cancel an in-progress deploy
# because that can leave Pages in a half-published state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Build site (strict)
        run: uv run zensical build -s

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
