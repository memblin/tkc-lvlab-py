repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        # Exclusions:
        # - docs/api/ pages contain `:::` mkdocstrings directives that
        #   must not be re-escaped by mdformat — particularly
        #   leading-underscore module names like ``tkc_lvlab._logging``
        #   that mdformat would otherwise rewrite to ``\_logging`` and
        #   break the directive.
        # - .claude/skills/ SKILL.md files start with YAML frontmatter
        #   delimited by ``---``; mdformat treats that delimiter as a
        #   horizontal rule and collapses the frontmatter into a header,
        #   which breaks skill discovery.
        #
        # Version note (2026-05-23): this combo (mdformat 0.7.22,
        # mdformat-mkdocs 4.4.2, mdformat-gfm 1.0.0) was the freshest
        # set verified against this repo's markdown corpus without
        # tripping mdformat's "Formatted Markdown renders to different
        # HTML" safety net. mdformat 1.0.0 + any plugin chain failed
        # that check on longer markdown content even with no plugins
        # loaded (confirmed upstream regression). mdformat-mkdocs 5.x
        # also fails the check regardless of which mdformat-core it's
        # paired with. The `more_itertools<11` upper bound is required
        # because mdformat-mkdocs 4.4.2 imports the removed-in-11
        # ``zip_equal`` symbol.
        exclude: ^(docs/api/|\.claude/skills/)
        additional_dependencies:
          - mdformat-mkdocs==4.4.2
          - mdformat-gfm==1.0.0
          - more_itertools<11
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # shellcheck-py ships its own shellcheck binary, so this hook
        # runs identically on every contributor's box without needing
        # a system-level shellcheck install. Covers scripts/*.sh and
        # any future shell we add. If a finding is genuinely a false
        # positive, prefer a per-line ``# shellcheck disable=SC...``
        # over broadening the exclude.
