---
environment:
  - name: libvirt-salt-dev
    libvirt_uri: qemu:///system
    config_defaults:
      domain: local
      os: debian13
      cpu: 2
      memory: 2048
      disks:
        - name: primary
          size: 25G
      interfaces:
          network: default
          # network_type defaults to 'network' (a managed libvirt network
          # named by the `network` field above). Set to 'user' or 'passt'
          # for user-mode networking — useful on qemu:///session where
          # rootless libvirt cannot manage a NAT network. Static IPs
          # (interfaces.ip4) are rejected under user-mode; DHCP is the
          # only supported configuration.
          network_type: network
      cloud_image_basedir: /tmp
      disk_image_basedir: /tmp
      shared_directories:
        # requires mounting in guest like:
        # mount -t virtiofs gitrepos /srv/git
        # ``~`` and ``$HOME`` are expanded against the user running lvlab,
        # so the example stays portable across machines.
        - source: ~/repos
          mount_tag: gitrepos
      cloud_init:
        user: root
        pubkey: ~/.ssh/id_ed25519.pub
        sudo: ["ALL=(ALL) NOPASSWD:ALL"]
        shell: /bin/bash

    machines:
      - vm_name: salt.local
        hostname: salt
        # The default fqdn is {hostname}.{domain} so the machine.fqdn value is not needed unless you need a more specific fqdn.
        fqdn: salt.some.specific.domain.local
        os: debian12
        disks:
          - name: primary
            size: 30G
        interfaces:
          - name: enp1s0
            ip4: 192.168.122.12/24
            ip4gw: 192.168.122.1
        # shared_directories defined here extend the config_defaults list.
        # An entry with the same mount_tag as a default overrides that default;
        # other defaults still apply. Below, salt.local mounts both `gitrepos`
        # (from defaults) and an additional `saltsrc` mount.
        shared_directories:
          - source: ~/salt
            mount_tag: saltsrc

      - vm_name: vault.local
        hostname: vault
        os: debian13
        interfaces:
          - name: eth0
            ip4: 192.168.122.16/24
            ip4gw: 192.168.122.1

      - vm_name: ghar.local
        hostname: ghar
        os: debian13
        interfaces:
          - name: eth0
            ip4: 192.168.122.17/24
            ip4gw: 192.168.122.1

      - vm_name: dhcp-config.local
        hostname: dhcp-config
        os: debian13
        interfaces:
          - name: eth0

      # Example of a VM that uses user-mode networking. Suitable for
      # qemu:///session deployments. Static IP fields are intentionally
      # omitted because SLIRP/passt ignore them; lvlab will refuse the
      # manifest at parse time if both 'network_type: user' and an
      # 'ip4' are set on the same interface.
      - vm_name: rootless.local
        hostname: rootless
        os: debian13
        interfaces:
          - name: eth0
            network_type: user

images:
  debian13:
    image_url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/trixie/latest/SHA512SUMS
    checksum_type: sha512
    network_version: 2
  debian12:
    image_url: https://cloud.debian.org/images/cloud/bookworm/20260518-2482/debian-12-generic-amd64-20260518-2482.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/bookworm/20260518-2482/SHA512SUMS
    checksum_type: sha512
    network_version: 2
  debian11:
    image_url: https://cloud.debian.org/images/cloud/bullseye/20260518-2482/debian-11-generic-amd64-20260518-2482.qcow2
    checksum_url: https://cloud.debian.org/images/cloud/bullseye/20260518-2482/SHA512SUMS
    checksum_type: sha512
    network_version: 1
  fedora44:
    image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2
    checksum_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-44-1.7-x86_64-CHECKSUM
    checksum_url_gpg: https://fedoraproject.org/fedora.gpg
    checksum_type: sha256
    network_version: 2
  # Custom images should follow a specific naming standard of $(--os-variant value)-$(ImageName)
  # The ImageName can be free-form but the start of the name must align with a valid --os-variant
  # value or the virt-install command will fail. See examples below, two debian12 based images
  # with varied software installed.
  debian12-salt:
    image_url: http://192.168.122.1:8080/cloud_images/debian-12-salt-20250121-0215.qcow2
    network_version: 2
  debian12-vault:
    image_url: http://192.168.122.1:8080/cloud_images/debian-12-vault-20250121-0716.qcow2
    network_version: 2
