name: build-release

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: 'Tag to build'
        required: true
  push:
    tags:
      # Stable: X.Y.Z
      - '[0-9]+.[0-9]+.[0-9]+'
      # PEP 440 pre-releases: X.Y.ZrcN, X.Y.ZaN, X.Y.ZbN
      - '[0-9]+.[0-9]+.[0-9]+rc[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+a[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+b[0-9]+'
    branches:
      - 'main'

jobs:
  auto-build-release:
    runs-on: ubuntu-latest
    # Only run auto-build when we push tags, not every push
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.ref_name }}
    # Fail-early gate: the release-notes file for this tag must exist,
    # must be non-empty, and must not still contain the template
    # sentinel. Runs before uv build so a missing/unfinished notes
    # file aborts in seconds, not after a wheel build.
    # See .github/release-notes/README.md for the recovery path when
    # this step fails (delete tag, add notes commit, re-tag).
    - name: Verify release notes file is present and ready
      env:
        TAG: ${{ github.ref_name }}
      run: |
        notes_file=".github/release-notes/${TAG}.md"
        if [ ! -f "${notes_file}" ]; then
          echo "::error::Release notes file missing: ${notes_file}"
          echo "Create it from .github/release-notes/_template.md, commit on main, then re-tag at the new HEAD."
          exit 1
        fi
        if [ ! -s "${notes_file}" ]; then
          echo "::error::Release notes file is empty: ${notes_file}"
          exit 1
        fi
        if grep -q "TEMPLATE: replace this file" "${notes_file}"; then
          echo "::error::Release notes file still contains the template sentinel: ${notes_file}"
          echo "Replace the template content before re-tagging."
          exit 1
        fi
        echo "Release notes file OK: ${notes_file}"
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.13'
    - name: Build tkc_lvlab
      run: uv build
    - name: Create release and upload artifacts
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
      run: |
        # Mark anything that isn't strict X.Y.Z as a pre-release so
        # GitHub flags it in the UI and `pip install` defaults don't
        # promote it over a stable.
        if [[ "${TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          prerelease_args=()
        else
          prerelease_args=(--prerelease)
        fi
        gh release create "${TAG}" "${prerelease_args[@]}" \
          --notes-file ".github/release-notes/${TAG}.md" \
          "./dist/tkc_lvlab-${TAG}-py3-none-any.whl"

  manual-build-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.build_tag }}
    - name: Verify release notes file is present and ready
      env:
        TAG: ${{ inputs.build_tag }}
      run: |
        notes_file=".github/release-notes/${TAG}.md"
        if [ ! -f "${notes_file}" ]; then
          echo "::error::Release notes file missing: ${notes_file}"
          echo "Create it from .github/release-notes/_template.md, commit on main, then re-run with a ref that includes it."
          exit 1
        fi
        if [ ! -s "${notes_file}" ]; then
          echo "::error::Release notes file is empty: ${notes_file}"
          exit 1
        fi
        if grep -q "TEMPLATE: replace this file" "${notes_file}"; then
          echo "::error::Release notes file still contains the template sentinel: ${notes_file}"
          echo "Replace the template content before re-triggering."
          exit 1
        fi
        echo "Release notes file OK: ${notes_file}"
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.13'
    - name: Build tkc_lvlab
      run: uv build
    - name: Create release and upload artifacts
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ inputs.build_tag }}
      run: |
        if [[ "${TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          prerelease_args=()
        else
          prerelease_args=(--prerelease)
        fi
        gh release create "${TAG}" "${prerelease_args[@]}" \
          --notes-file ".github/release-notes/${TAG}.md" \
          "./dist/tkc_lvlab-${TAG}-py3-none-any.whl"
